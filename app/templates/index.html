<!DOCTYPE html>
<html lang="en">
    <head> 
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title> Hospital Risk Predictor </title>
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
        <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}"/>
    </head>

    <body>
        <header class="hero">
            <div class="hero-pill"> ML-powered </div>
            <h1>patient <span class="accent">.</span>risk</h1>
            <p class="subtitle">enter patient details to predict hospital re-admission risk</p>
        </header>

        <main class="container"> 
            <div class="card" style="--card-delay:0.1">
                <div class="card-label">01 - who's the patient</div>
                <h2 class="class-title"> Patient Information</h2>
                <div class="grid">
                    <div class="field">
                        <label for ="Age">Age</label>
                        <input type="number" id="Age" value="45" min="0" max="120"/>
                    </div>
                    <div class="field">
                        <label for="Gender">Gender</label>
                        <select id="Gender">
                            <option>Male</option>
                            <option>Female</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for ="Blood Type"> Blood Type</label>
                        <select id="BloodType">
                            <option>A+</option>
                            <option>A-</option>
                            <option>B+</option>
                            <option>B-</option>
                            <option>AB+</option>
                            <option>AB-</option>
                            <option>O+</option>
                            <option>O-</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="Medical Condition">Medical Condition</label>
                        <select id="MedicalCondition">
                            <option>Diabetes</option>
                            <option>Hypertension</option>
                            <option>Arthritis</option>
                            <option>Cancer</option>
                            <option>Asthma</option>
                            <option>Obesity</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card" style="--card-delay: 0.2s">
                <div class="card-label">02 - admission details</div>
                <h2 class="card-title"> Admission Information</h2>
                <div class="grid">

                    <div class="field">
                        <label for="Admission Type"> Admission Type</label>
                        <select id="AdmissionType">
                            <option>Emergency</option>
                            <option>Elective</option>
                            <option>Urgent</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="Length of Stay"> Length of Stay</label>
                        <input type="number" id="LengthOfStay" value="5" min="1"/>
                    </div>
                </div>
            </div>

            <div class="card" style="--card-delay: 0.3s">
                <div class="card-label"> 03- billing and insurance</div>
                <h2 class="card-title"> Billing Information</h2>
                <div class="grid">

                    <div class="field">
                        <label for="Insurance Provider"> Insurance Provider</label>
                        <select id="InsuranceProvider">
                            <option>Medicare</option>
                            <option>Aetna</option>
                            <option>Blue Cross</option>
                            <option>Cigna</option>
                            <option>UnitedHealthCare</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="Billing Amount"> Billing Amount</label>
                        <input type="number" id="BillingAmount" value="15000" min="0"/>
                    </div>
                </div>
            </div>

            <button class="btn" id="predictBtn" onclick="predict()">
                <span id="btn-text">predict risk </span>
                <span id="spinner" style="display:none">analysing...</span>
            </button>

            <p class="error-msg" id="errorMsg"></p>

            <div class="result" id="result">
                <div class="risk-badge" id="riskBadge">  </div>
                <div class="prob-number" id="probNumber"> </div>
                <div class="prob-label">readmission risk probability</div>
                <div class="verdict" id="verdict">       </div>
                <div class="quip" id="quip">             </div>
            </div>

        </main>
        <script src="{{url_for('static', filename='script.js')}}"></script>
    </body>
</html>
